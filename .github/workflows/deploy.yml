name: Deploy Dashboard

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject token into HTML
        run: |
          sed -i "s|token: ''|token: '${{ secrets.GH_TOKEN }}'|g" dashboard.html
          sed -i "s|repo:  ''|repo:  'ssookssookji/My_hard'|g" dashboard.html

      - name: Copy to docs
        run: |
          mkdir -p docs
          cp dashboard.html docs/index.html

      - name: Deploy
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
