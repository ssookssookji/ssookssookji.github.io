name: Deploy Dashboard

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject token into HTML files
        run: |
          sed -i "s|token: ''|token: '${{ secrets.GH_TOKEN }}'|g" dashboard.html
          sed -i "s|repo:  ''|repo:  'ssookssookji/My_hard'|g" dashboard.html
          sed -i "s|token: ''|token: '${{ secrets.GH_TOKEN }}'|g" CHK_list.html
          sed -i "s|repo:  ''|repo:  'ssookssookji/My_hard'|g" CHK_list.html

      - name: Copy to docs
        run: |
          mkdir -p docs
          cp dashboard.html docs/index.html
          cp CHK_list.html docs/CHK_list.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
